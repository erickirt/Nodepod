<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nodepod terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 14px; font-weight: 600; }
    header span { font-size: 12px; color: #8b949e; }
    .container { flex: 1; display: flex; min-height: 0; }
    #terminal-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
    #preview-panel { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
    #preview-panel .bar { padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 8px; }
    #preview-panel .bar .url { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 4px 8px; color: #c9d1d9; flex: 1; font-family: monospace; font-size: 12px; }
    #preview-panel .bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
    #preview-panel .bar .dot.live { background: #3fb950; }
    #preview-frame { flex: 1; border: none; background: #fff; }
    #terminal-box { flex: 1; padding: 4px; }
    .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>nodepod</h1>
    <span>terminal + preview</span>
  </header>
  <div class="container">
    <div id="terminal-panel">
      <div id="terminal-box"></div>
    </div>
    <div id="preview-panel">
      <div class="bar">
        <div class="dot" id="status-dot"></div>
        <div class="url" id="preview-url">waiting for server...</div>
      </div>
      <iframe id="preview-frame" class="placeholder" srcdoc="<html><body style='background:#0d1117;color:#484f58;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0'><p>run a dev server to see a preview</p></body></html>"></iframe>
    </div>
  </div>

  <script type="module">
    import { Nodepod } from "/dist/index.mjs";
    import { Terminal } from "https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm";
    import { FitAddon } from "https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/+esm";

    const previewFrame = document.getElementById("preview-frame");
    const previewUrl = document.getElementById("preview-url");
    const statusDot = document.getElementById("status-dot");

    const nodepod = await Nodepod.boot({
      swUrl: "/__sw__.js",
      workdir: "/home",
      files: {
        "/home/index.js": [
          'const http = require("http");',
          'const server = http.createServer((req, res) => {',
          '  res.writeHead(200, { "Content-Type": "text/html" });',
          '  res.end("<h1>hello from nodepod</h1><p>running inside your browser</p>");',
          '});',
          'server.listen(3000, () => console.log("server listening on port 3000"));',
        ].join("\n"),
      },
      onServerReady(port, url) {
        previewUrl.textContent = url;
        statusDot.classList.add("live");
        previewFrame.removeAttribute("srcdoc");
        previewFrame.src = url;
      },
    });

    const terminal = nodepod.createTerminal({
      Terminal,
      FitAddon,
      fontSize: 13,
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
    });

    terminal.attach(document.getElementById("terminal-box"));
  </script>
</body>
</html>
